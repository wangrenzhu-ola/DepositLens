name: DepositLens
options:
  deploymentTarget:
    iOS: "14.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.wangrenzhu.depositlens
targets:
  DepositLens:
    type: application
    platform: iOS
    sources:
      - DepositLens
      - DepositLensCore
    settings:
      base:
        INFOPLIST_FILE: DepositLens/Resources/Info.plist
        CODE_SIGNING_ALLOWED: NO
    scheme:
      testTargets: [DepositLensCoreTests, DepositLensUITests]
  DepositLensCoreTests:
    type: bundle.unit-test
    platform: iOS
    sources: [DepositLensCoreTests]
    dependencies:
      - target: DepositLens
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  DepositLensUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [DepositLensUITests]
    dependencies:
      - target: DepositLens
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
